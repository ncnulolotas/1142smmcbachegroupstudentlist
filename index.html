            { id: "G7", num: 7, name: "第七組", time: "每週二 20:00 線上", members: ["112212036", "110251007", "111106007", "111106034", "111212091", "111251050", "112212038"] },
            { id: "G8", num: 8, name: "第八組", time: "星期五 20:30 線上", members: ["112251003", "112251010", "112251031", "112251033", "112251034", "112251035"] },
            { id: "G9", num: 9, name: "第九組", time: "星期二 08:20 實體", members: ["112251021", "110407036", "112211061", "112251032", "112251037", "112251038"] },
            { id: "G10", num: 10, name: "第十組", time: "星期一 12:00 學餐", members: ["112212022", "111212094", "112212004", "112212013", "112212021", "112212027", "112212068"] },
            { id: "G11", num: 11, name: "第十一組", time: "星期三 15:00 線上", members: ["112212006", "112212014", "112212034", "112212039", "112212044", "112212062", "112212077"] }
        ];

        const I18N = {
            ZH: {
                title: "1142 國際策略管理 SMMC", subtitle: "學生個人資料名單統整", searchPlaceholder: "搜尋姓名、學號、科系、MBTI...",
                group: "第", groupEnd: "組", leader: "組長", member: "組員", timeLoc: "討論時間/地點",
                bio: "一句話描述", dept: "系級", sid: "學號", mbti: "MBTI", experience: "經歷",
                motivation: "動機與期待", needs: "需要哪些協助", allGroups: "全部小組"
            },
            EN: {
                title: "1142 Strategic Management", subtitle: "SMMC Student Directory", searchPlaceholder: "Search by name, ID, MBTI...",
                group: "Group ", groupEnd: "", leader: "Leader", member: "Member", timeLoc: "Meeting Time",
                bio: "Bio", dept: "Dept.", sid: "ID", mbti: "MBTI", experience: "Exp.",
                motivation: "Motivation", needs: "Needs Help", allGroups: "All Groups"
            }
        };

        const ROTATE_90_SIDS = ['112104009', '112407035', '112251009', '112251033', '112251021', '112212068'];

        // --- State ---
        let lang = 'ZH';
        let isDarkMode = true;
        let activeGroup = 'ALL';
        let searchTerm = '';
        let parsedData = [];
        let studentsMap = new Map();

        // --- Logic ---
        function initData() {
            // 直接以安全的方式建立對照表
            RAW_INDIVIDUALS.forEach(ind => {
                studentsMap.set(ind.sid, ind);
            });

            parsedData = RAW_GROUPS.map(g => {
                const members = g.members.map((sid, idx) => {
                    const info = studentsMap.get(sid) || { sid, name: "未知成員", dept: "N/A", mbti: "N/A", photo: "" };
                    return { ...info, isLeader: idx === 0 };
                });
                return { id: g.id, num: g.num, name: g.name, time: g.time, members };
            }).sort((a,b) => a.num - b.num);
        }

        function render() {
            const t = I18N[lang];
            
            // Header
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-subtitle').innerText = t.subtitle;
            document.getElementById('search-input').placeholder = t.searchPlaceholder;

            // Nav
            const nav = document.getElementById('group-nav');
            nav.innerHTML = `<button onclick="setActiveGroup('ALL')" class="px-4 md:px-6 py-1.5 md:py-2.5 rounded-xl text-xs md:text-base font-bold whitespace-nowrap transition-all ${activeGroup === 'ALL' ? 'bg-emerald-500 text-white shadow-lg' : (isDarkMode ? 'bg-slate-900 text-slate-400' : 'bg-white text-slate-600 border')}">${t.allGroups}</button>`;
            parsedData.forEach(g => {
                const btnLabel = lang === 'EN' ? `Group ${g.num}` : `第${g.num}組`;
                nav.innerHTML += `<button onclick="setActiveGroup('${g.id}')" class="px-4 md:px-6 py-1.5 md:py-2.5 rounded-xl text-xs md:text-base font-bold whitespace-nowrap transition-all ${activeGroup === g.id ? 'bg-emerald-500 text-white shadow-lg' : (isDarkMode ? 'bg-slate-900 text-slate-400' : 'bg-white text-slate-600 border')}">${btnLabel}</button>`;
            });

            // Main Content
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            
            const filtered = parsedData.filter(g => {
                if(searchTerm === '' && activeGroup !== 'ALL' && g.id !== activeGroup) return false;
                const matchesSearch = g.members.some(m => 
                    m.name.toLowerCase().includes(searchTerm) || 
                    m.sid.includes(searchTerm) || 
                    m.mbti.toLowerCase().includes(searchTerm) ||
                    m.dept.toLowerCase().includes(searchTerm)
                );
                return searchTerm === '' ? true : matchesSearch;
            });

            if(filtered.length === 0) {
                main.innerHTML = `<div class="text-center py-24 text-slate-500 border-2 border-dashed border-slate-800 rounded-3xl">無搜尋結果。</div>`;
            }

            filtered.forEach(g => {
                const groupTitle = lang === 'EN' ? `Group ${g.num}` : `第${g.num}組`;
                let groupHTML = `
                    <section class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="flex flex-col md:flex-row md:items-end justify-between gap-2 border-b-2 border-emerald-500 pb-2">
                            <div>
                                <h2 class="text-3xl md:text-4xl font-bold">${groupTitle}</h2>
                                <div class="flex items-center gap-2 text-sm md:text-lg mt-2 font-medium text-slate-400">
                                    <i data-lucide="message-circle" class="w-4 h-4 text-emerald-500"></i>
                                    <span>${t.timeLoc}: ${g.time}</span>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-6">
                `;

                g.members.forEach(m => {
                    // Search filtering within group
                    if(searchTerm !== '' && 
                       !m.name.toLowerCase().includes(searchTerm) && 
                       !m.sid.includes(searchTerm) && 
                       !m.mbti.toLowerCase().includes(searchTerm) && 
                       !m.dept.toLowerCase().includes(searchTerm)) return;
                    
                    const imgUrl = m.photo?.length > 10 ? `https://lh3.googleusercontent.com/u/0/d/${m.photo}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=10b981&color=fff`;
                    const rotateClass = ROTATE_90_SIDS.includes(m.sid) ? 'rotate-90' : '';
                    const roleLabel = m.isLeader ? t.leader : t.member;
                    const roleClass = m.isLeader ? 'bg-emerald-500 text-white' : (isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-500');

                    groupHTML += `
                        <div onclick="openModal('${m.sid}')" class="group relative rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl ${isDarkMode ? 'bg-slate-900 border border-slate-800 hover:border-emerald-500/50' : 'bg-white border shadow-sm hover:border-emerald-500'}">
                            <div class="absolute top-4 right-4 z-10 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ${roleClass}">${roleLabel}</div>
                            <div class="relative aspect-[4/5] bg-slate-800 overflow-hidden flex items-center justify-center">
                                <img src="${imgUrl}" class="w-full h-full object-contain grayscale group-hover:grayscale-0 transition-all duration-500 ${rotateClass}">
                                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent opacity-60"></div>
                                <div class="absolute bottom-3 left-3 right-3">
                                    <h3 class="text-lg md:text-2xl font-bold text-white group-hover:text-emerald-400 transition-colors">${m.name}</h3>
                                    <p class="text-[10px] md:text-sm text-emerald-400/80 font-semibold truncate">${m.dept}</p>
                                    <p class="text-[10px] md:text-sm text-slate-400">${m.sid}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                groupHTML += `</div></section>`;
                main.innerHTML += groupHTML;
            });

            // Re-render icons for dynamically added content
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        // --- Interaction ---
        function setActiveGroup(id) {
            activeGroup = id;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openModal(sid) {
            const student = studentsMap.get(sid);
            if(!student) return;
            const t = I18N[lang];
            const imgUrl = student.photo?.length > 10 ? `https://lh3.googleusercontent.com/u/0/d/${student.photo}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(student.name)}&background=10b981&color=fff`;
            const rotateClass = ROTATE_90_SIDS.includes(student.sid) ? 'rotate-90' : '';

            const modal = document.getElementById('modal-content');
            modal.innerHTML = `
                <button onclick="closeModal()" class="absolute top-4 right-4 z-50 p-2 rounded-full bg-slate-800/50 hover:bg-slate-800 text-white transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <div class="flex flex-col md:flex-row w-full h-full max-h-[90vh] overflow-y-auto md:overflow-hidden no-scrollbar">
                    <div class="shrink-0 flex items-center justify-center p-8 md:w-2/5 ${isDarkMode ? 'bg-slate-900' : 'bg-slate-50'} md:border-r border-slate-800">
                        <div class="w-full max-w-[280px] md:max-w-none aspect-[4/5] rounded-3xl overflow-hidden border-4 border-emerald-500 shadow-xl bg-slate-800">
                            <img src="${imgUrl}" class="w-full h-full object-cover ${rotateClass}">
                        </div>
                    </div>
                    <div class="p-8 space-y-6 md:overflow-y-auto no-scrollbar md:w-3/5">
                        <div>
                            <h3 class="text-3xl md:text-4xl font-bold">${student.name}</h3>
                            <p class="text-emerald-500 font-semibold text-lg">${student.dept} • ${student.sid}</p>
                            <div class="mt-2 inline-block px-3 py-1 rounded-lg ${isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-200 text-slate-700'} text-xs font-bold tracking-widest">${t.mbti}: ${student.mbti}</div>
                        </div>
                        <div class="relative p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-950/50 border-slate-800 text-slate-300' : 'bg-slate-100 border-slate-200'} italic font-medium leading-relaxed">
                            “ ${student.bio || '尚未填寫自介'} ”
                        </div>
                        <div class="space-y-6 pt-4 border-t border-slate-800">
                            <div>
                                <div class="flex items-center gap-2 mb-1 text-xs font-bold text-slate-500 uppercase tracking-widest">
                                    <i data-lucide="briefcase" class="w-4 h-4 text-emerald-500"></i> ${t.experience}
                                </div>
                                <p class="text-sm md:text-base leading-relaxed">${student.experience || '---'}</p>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1 text-xs font-bold text-slate-500 uppercase tracking-widest">
                                    <i data-lucide="target" class="w-4 h-4 text-emerald-500"></i> ${t.motivation}
                                </div>
                                <p class="text-sm md:text-base leading-relaxed">${student.motivation || '---'}</p>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1 text-xs font-bold text-slate-500 uppercase tracking-widest">
                                    <i data-lucide="message-circle" class="w-4 h-4 text-emerald-500"></i> ${t.needs}
                                </div>
                                <p class="text-sm md:text-base leading-relaxed">${student.needs || '---'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('modal-container').classList.remove('hidden');
            document.body.classList.add('modal-open');
            
            // Render icons specifically for the newly injected modal content
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        // --- Event Listeners ---
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            render();
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            const body = document.body;
            const header = document.getElementById('sticky-header');
            const controls = document.getElementById('theme-lang-controls');
            const icon = document.querySelector('#theme-toggle i');
            const searchInput = document.getElementById('search-input');

            if(isDarkMode) {
                body.className = "bg-slate-950 text-slate-100";
                header.className = "sticky top-0 z-50 backdrop-blur-md border-b border-slate-800/80 bg-slate-950/90 shadow-sm";
                controls.className = "flex items-center gap-0.5 md:gap-1 p-0.5 md:p-1 rounded-full bg-slate-900 border border-slate-800";
                searchInput.className = "w-full rounded-full py-1.5 md:py-2.5 pl-9 md:pl-10 pr-4 text-xs md:text-base font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all bg-slate-900/50 border border-slate-800 placeholder-slate-600 text-slate-100";
                if (icon) {
                    // Update lucide icon dataset attribute before re-rendering
                    icon.dataset.lucide = 'sun';
                }
            } else {
                body.className = "bg-slate-50 text-slate-900";
                header.className = "sticky top-0 z-50 backdrop-blur-md border-b border-slate-200 bg-white/90 shadow-sm";
                controls.className = "flex items-center gap-0.5 md:gap-1 p-0.5 md:p-1 rounded-full bg-slate-100 border border-slate-200";
                searchInput.className = "w-full rounded-full py-1.5 md:py-2.5 pl-9 md:pl-10 pr-4 text-xs md:text-base font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all bg-slate-100 border border-slate-300 placeholder-slate-500 text-slate-900";
                if (icon) {
                     // Update lucide icon dataset attribute before re-rendering
                    icon.dataset.lucide = 'moon';
                }
            }
            
            render();
        });

        document.getElementById('lang-toggle').addEventListener('click', () => {
            lang = lang === 'ZH' ? 'EN' : 'ZH';
            render();
        });

        document.getElementById('modal-overlay').addEventListener('click', closeModal);

        // --- Init ---
        window.onload = () => {
            initData();
            render();
            // Initial call to create icons that are hardcoded in the HTML
            if (window.lucide) {
                window.lucide.createIcons();
            }
        };
    </script>
</body>
</html>
